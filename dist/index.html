<!DOCTYPE html>
<html lang="es" data-bs-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Índice - Cancionero</title>
  <link rel="stylesheet" href="assets/bootstrap/css/bootstrap.min.css">
</head>
<body class="bg-body-tertiary">
  <div class="container py-5">
    <h1 class="mb-4 text-center">🎶 Cancionero</h1>
    
    <div class="row justify-content-center mb-4">
      <div class="col-md-8">
        <input type="text" id="searchInput" class="form-control form-control-lg" placeholder="Buscar por título o artista...">
      </div>
    </div>

    <div class="row justify-content-center">
      <div class="col-md-8">
        <ul class="list-group shadow-sm" id="songList">
          
            <li class="list-group-item list-group-item-action d-flex justify-content-between align-items-center song-item" data-search="zamba de mi esperanza jorge cafrune">
              <a href="canciones/ejemplo.html" class="text-decoration-none text-body stretched-link w-100">
                <strong>Zamba de mi esperanza</strong> <span class="text-muted ms-2">- Jorge Cafrune</span>
              </a>
            </li>
          
        </ul>
      </div>
    </div>
  </div>

  <script>
    document.getElementById('searchInput').addEventListener('input', function(e) {
      const term = e.target.value.toLowerCase();
      const items = document.querySelectorAll('.song-item');
      items.forEach(item => {
        const text = item.getAttribute('data-search');
        if (text.includes(term)) {
          item.classList.remove('d-none');
          item.classList.add('d-flex');
        } else {
          item.classList.remove('d-flex');
          item.classList.add('d-none');
        }
      });
    });
  </script>
</body>
</html>
