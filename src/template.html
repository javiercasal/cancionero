<!DOCTYPE html>
<html lang="es" data-bs-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{TITLE}} - {{ARTIST}} | Cancionero</title>
  <link rel="stylesheet" href="../assets/bootstrap/css/bootstrap.min.css">
  <link rel="stylesheet" href="../css/custom.css">
  <link rel="stylesheet" href="../css/print.css" media="print">
</head>
<body>
  <!-- CONTROLES -->
  <nav class="controls-bar container-fluid d-flex justify-content-between align-items-center">
    <div class="d-flex gap-2 align-items-center">
      <a href="../index.html" class="btn btn-outline-secondary btn-sm">&larr; Índice</a>
      <div class="btn-group shadow-sm" role="group">
        <button id="btn-transpose-down" class="btn btn-outline-primary btn-sm">-</button>
        <button id="btn-transpose-reset" class="btn btn-outline-primary btn-sm fw-bold">Tono</button>
        <button id="btn-transpose-up" class="btn btn-outline-primary btn-sm">+</button>
      </div>
      <button id="btn-toggle-chords" class="btn btn-outline-secondary btn-sm">Ocultar acordes</button>
    </div>
    <div>
      <button id="btn-theme-toggle" class="btn btn-sm btn-dark">🌙 Modo Oscuro</button>
      <button onclick="window.print()" class="btn btn-sm btn-success">🖨️ Imprimir</button>
    </div>
  </nav>

  <!-- CANCIÓN -->
  <div class="container" id="song-container">
    {{RENDERED_SONG}}
  </div>

  <!-- DATOS -->
  <script type="text/plain" id="original-chordpro">
    {{CHORDPRO_DATA}}
  </script>

  <!-- BUNDLE (siempre al final) -->
  {{BUNDLED_JS}}
</body>
</html>
